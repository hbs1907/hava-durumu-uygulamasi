<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Şehir ismi giriniz..." spellcheck="false"> 
            <button><img src="searchbutton.png"></button>
            <h1></h1>

        <div class="weather">
            <img src="rain.jpeg" class="weather-icon" alt="Hava Durumu">

                <p class="humidity">%50 Nem</p>
                <p class="wind">15 km/s Rüzgar</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
